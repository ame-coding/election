<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Add Candidate Page</title>
	<link rel="stylesheet" th:href="@{/css/base.css}">
	<link rel="stylesheet" th:href="@{/css/layout.css}">
	<link rel="stylesheet" th:href="@{/css/card.css}">
	<link rel="stylesheet" th:href="@{/css/form.css}">
	<link rel="stylesheet" th:href="@{/css/table.css}">
	<link rel="stylesheet" th:href="@{/css/warningbox.css}">
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="/js/party.js"></script>
</head>	
<body>

	<div class="layout">
	<div th:replace="~{fragments/layout :: topnav}"></div>
	<div th:replace="~{fragments/layout :: sidebar('addcandidate')}"></div>
	
	<main class="main">
		<h1 class="page-title">Entry of Candidate</h1>
		
	
		<p th:if="${successMessage}" th:text="${successMessage}" class="alert alert-success"></p>
		<p th:if="${errorMessage}" th:text="${errorMessage}" class="alert alert-error"></p>
		
		
		<div class="form-wrapper">
			<form id="addcandidate" th:action="@{/addcandidate}" th:object= "${addCandidateDto}" method="post">
				<div class="form-group">
					<label>Candidate Name</label>
					<input class="form-control" type="text" id="candidatename" name="candidatename" th:field="*{name}" required />
					<span id="candidatename-error" class="form-error"></span>
					<span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="form-error"></span>
				</div>
				<div class="form-group">
					<label>Party</label>
					<select class="form-control" name="partydropdown" id="partydropdown" th:field="*{Partyno}" required>
						<option value="">Select Party</option>
					</select>
					<span id="partydropdown-error" class="form-error"></span>
					<span th:if="${#fields.hasErrors('Partyno')}" th:errors="*{Partyno}" class="form-error"></span>
				</div>
				<button type="submit" class="btn-primary">Enter</button>
			</form>
		</div>
		
		<br><br>
		
		<div th:if="${deleteWarningId}" class="warning-box">
		    <p th:text="${message}" class="warning-message"></p>
		    <form th:action="@{/viewcandidates/confirmdelete/{id}(id=${deleteWarningId})}" method="post">
		        <button type="submit" class="button-type">Yes, delete anyway</button>
		        <a th:href="@{/addcandidate}" class="button-cancel">Cancel</a>
		    </form>
		</div>
		
		<br><br>
		
		<input type="text" id="search" placeholder="Search..." oninput="filterTable()" class="search-input"/>
		
		<table id="candidate-table">
			<thead>
				<th>#</th>
				<th>Candidate Name</th>
				<th>Party Name</th>
				<th>Party Symbol</th>
				<th>Assembly Constituencies</th>
				<th>Action</th>
			</thead>
			<tbody>
				<tr th:each="candidate, iterStat: ${viewCandidates}">
					<td th:text="${iterStat.count}"></td>
					<td th:text="${candidate.name}"></td>
					<td th:text="${candidate.party.name}"></td>
					<td>
						<img th:src="@{/parties/{code}/image(code=${candidate.party.code})}" width="100" height="100" alt="placeholderimg" />
					</td>
					<td>
						<li th:each="assemblyconstituency: ${candidate.ac}" th:text="${assemblyconstituency.name}"></li>
					</td>
					<td>
						<form th:action="@{/viewcandidates/delete/{id}(id=${candidate.code})}" method="post">
						    <button type="submit" onClick="return confirm('Are you sure you want to delete this entry?')" class="btn-primary">Delete</button>
						</form>
					</td>
				</tr>
			</tbody>
		</table>


		
		
	</main>
	
	<div th:replace="~{fragments/layout :: footer}"></div>

	
	
	<script>
		
		function filterTable(){
			const q=$("#search").val().toLowerCase();
			$("#candidate-table tbody tr").each(function (){
				
				const text = $(this).text().toLowerCase();
				$(this).toggle(text.includes(q));
			
			});
		}	
	
	
	</script>
	
	</div>
</body>
</html>
