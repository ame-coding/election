<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Voter Page</title>
	<link rel="stylesheet" th:href="@{/css/base.css}">
	<link rel="stylesheet" th:href="@{/css/layout.css}">
	<link rel="stylesheet" th:href="@{/css/card.css}">
	<link rel="stylesheet" th:href="@{/css/form.css}">
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="/js/assemblyconstituency.js"></script>
</head>	
<body>
	
	
	<div class="layout">
	<div th:replace="~{fragments/layout :: topnav}"></div>
	<div th:replace="~{fragments/layout :: sidebar('addvoters')}"></div>
	
	<main class="main">
		<h1 class="page-title">Entry of Voters</h1>
		
		
		<p th:if="${successMessage}" th:text="${successMessage}" class="alert alert-success"></p>
		<p th:if="${errorMessage}" th:text="${errorMessage}" class="alert alert-error"></p>
		
		<div class="form-wrapper">
			<form id="addvoters" th:action="@{/addvoters}" th:object= "${votespolled}" method="post">
					<div class="form-group">
						<label>Assembly Constituency</label>
						<select class="form-control" name="acdropdown" id="acdropdown" th:field="*{acno}" required>
							<option value="">Select Assembly Constituency</option>
						</select>
						<span id="acdropdown-error" class="form-error"></span>
						<span th:if="${#fields.hasErrors('acno')}" th:errors="*{acno}" class="form-error"></span>
					</div>
					<div class="form-group">
						<label>Total Voters</label>
						<input type="number" id="votercount" name="votercount" th:field="*{totalvoters}" class="form-control" required />
						<span id="votercount-error" class="form-error"></span>
						<span th:if="${#fields.hasErrors('totalvoters')}" th:errors="*{totalvoters}" class="form-error"></span>
					</div>
					<div class="form-group">
						<label>Votes Polled</label>
						<input type="number" id="votespolled" name="votespolled" th:field="*{totalvotespolled}" class="form-control" required />
						<span id="votespolled-error" class="form-error"></span>
						<span th:if="${#fields.hasErrors('totalvotespolled')}" th:errors="*{totalvotespolled}" class="form-error"></span>
					</div>
					
					<button type="submit" class="btn-primary">Enter</button>
			</form>
		</div>

		
	</main>

	<div th:replace="~{fragments/layout :: footer}"></div>
	
	</div>
	
	<script>
		
		function validateAC(){
			
			const input=document.querySelector('#acdropdown');
			const error=document.querySelector('#acdropdown-error');
						
			if(input.value===''){
				
				error.textContent='Please select an option';
				return false;
				
			}
		
			error.textContent='';
			return true;
				
		}
		
		function validateTotalVoters(){
			
			const input=document.querySelector('#votercount');
			const error=document.querySelector('#votercount-error');
			const val=Number(input.value);
			
			if(input.value.trim() === ''){
				
				error.textContent='This field is required';
				return false;
				
			}
			
			if(val<=9999){
				
				error.textContent='Total Voters must be greater than 9999';
				return false;
				
			}
			
			error.textContent='';
			if(document.querySelector('#votespolled').value !== '') validateVotesPolled();
			return true;
			
		}
	
		function validateVotesPolled(){
			
			const input=document.querySelector('#votespolled');
			const error=document.querySelector('#votespolled-error');
			const val=Number(input.value);
			const voters=Number(document.querySelector('#votercount').value);
			
			if(input.value.trim()===''){
				
				error.textContent='This field is required';
				return false;
				
			}
			
			if(val<=9999){
				
				error.textContent='Votes Polled must be greater than 9999';
				return false;
				
			}
			
			if(val>voters){
				
				error.textContent='Votes Polled cannot be greater than Total No. of Voters';
				return false;
				
			}
			
			
			error.textContent='';
			return true;
			
		}
		
		//Listeners
		document.querySelector('#acdropdown').addEventListener('change', validateAC);
		document.querySelector('#votercount').addEventListener('input', validateTotalVoters);
		document.querySelector('#votespolled').addEventListener('input', validateVotesPolled);
		
	
		document.getElementById("addvoters").addEventListener("submit", function(e){
			
			const valid=validateAC() & validateTotalVoters() & validateVotesPolled();
			
			if(!valid){
				
				e.preventDefault();
				alert('Please fix errors before submitting');
				
			}
			
		});
		
	</script>
	
	
	
</body>
</html>
