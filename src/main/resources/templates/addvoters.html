<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Voter Page</title>
	<link th:href="@{/css/home.css}" rel="stylesheet">
</head>	
<body>
	<nav class="topnav">
		<a class="topenav__brand" href="#">MyApp</a>
		<form th:action="@{/logout}" method="post">
			<button type="submit" class="btn-logout">Logout</button>
		</form>
	</nav>
	
	<aside class="sidebar">
		<span class="sidebar__label">Main</span>
		<a th:href="@{/}" class="nav-btn">Home</a>
		<a th:href="@{/}" class="nav-btn active">Add Voters</a>
		<a th:href="@{/}" class="nav-btn">Button 3</a>
		
		<div class="sidebar__divider"></div>
		<span class="sidebar__label">Manage</span>
		<a th:href="@{/}" class="nav-btn">Button 4</a>
	</aside>
	
	<main class="main">
		<h1 class="page-title">Entry of Voters</h1>
		
		<form th:action="@{/}" method="post">
				<div>
					<label>Assembly Constituency</label>
					<input type="text" name="ac" />
				</div>
				<div>
					<label>Total Voters</label>
					<input type="text" name="votercount" />
				</div>
				<div>
					<label>Votes Polled</label>
					<input type="text" name="votespolled" />
				</div>
				<button type="submit">Enter</button>
		</form>
		
	</main>
	
	
</body>
</html>
