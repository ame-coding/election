<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Map Candidate to AC Page</title>
	<link rel="stylesheet" th:href="@{/css/base.css}">
	<link rel="stylesheet" th:href="@{/css/layout.css}">
	<link rel="stylesheet" th:href="@{/css/card.css}">
	<link rel="stylesheet" th:href="@{/css/form.css}">
	<link rel="stylesheet" th:href="@{/css/table.css}">
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
	<script src="/js/assemblyconstituency.js"></script>
</head>
<body>
	
	<div class="layout">
		
		<div th:replace="~{fragments/layout :: topnav}"></div>
		<div th:replace="~{fragments/layout :: sidebar('countingrounds')}"></div>
		
		<main class="main">
				<h1 class="page-title">Counting Rounds</h1>
				
			
				<p th:if="${successMessage}" th:text="${successMessage}" class="alert alert-success"></p>
				<p th:if="${errorMessage}" th:text="${errorMessage}" class="alert alert-error"></p>
				
				
				<div class="form-wrapper">
					<form id="countingrounds" th:action="@{/countingrounds}" th:object= "${countingrounds}" method="post">
						<div class="form-group">
							<label>Assembly Constituency</label>
							<select class="form-control" name="acdropdown" id="acdropdown" th:field="*{acno}" required>
								<option value="">Select Assembly Constituency</option>
							</select>
							<span id="acdropdown-error" class="form-error"></span>
							<span th:if="${#fields.hasErrors('acno')}" th:errors="*{acno}" class="form-error"></span>						
						</div>
						<div class="form-group">
							<label>No of Rounds</label>
							<input type="number" th:field="*{roundno}" id="roundno" min="1" class="form-control" required />
							<span id="roundno-error" class="form-error"></span>
							<span th:if="${#fields.hasErrors('roundno')}" th:errors="*{roundno}" class="form-error"></span>
						</div>
						<button type="submit" class="btn-primary">Enter</button>
					</form>
				</div>
				
				<br><br>

				<input type="text" id="search" placeholder="Search..." oninput="filterTable()" class="search-input"/>

				<table id="countingrounds-table">
					<thead>
						<tr>
							<th>#</th>
							<th>Assembly Constituency</th>
							<th>Round No</th>
							<th>Description</th>
							<th>Action</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="round: ${viewrounds}" th:data-id="${round.acno}">
							<td th:text="${round.acno}"></td>
							<td th:text="${round.acname}"></td>
							<td th:text="${round.rounds}"></td>
							<td th:text="${round.desc}"></td>
							<td>
							    <form th:action="@{/countingrounds/delete/{acno}/{rounds} (acno=${round.acno}, rounds=${round.rounds})}" method="post">
							        <button type="submit" onClick="return confirm('Are you sure you want to delete this entry?')" class="btn-primary">Delete</button>
							    </form>
							</td>
						</tr>
					</tbody>
				</table>

				
				
				
				
				
			</main>
	
			<div th:replace="~{fragments/layout :: footer}"></div>
						
	</div>
	
	<script>
		
		function filterTable(){
			const q=$("#search").val().toLowerCase();
			$("#countingrounds-table tbody tr").each(function (){
				
				const text = $(this).text().toLowerCase();
				$(this).toggle(text.includes(q));
			
			});
		}
	
	    /*$('#acdropdown').on('change', function () {
	        const code = $(this).val();
	        if (!code) return;

	        $.get('/countingrounds/next-no', { acno: code }, function (nextNo) {
	            $('#roundno').val(nextNo);
	            $('#nextHint span').text(nextNo);
	        });
	    });*/
	</script>
	
	
	
</body>
</html>
