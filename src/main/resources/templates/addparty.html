<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Add Party Page</title>
	<link th:href="@{/css/home.css}" rel="stylesheet">
	<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>	
<body>
	<nav class="topnav">
		<a class="topenav__brand" href="#">Election Trends</a>
		<form th:action="@{/logout}" method="post">
			<button type="submit" class="btn-logout">Logout</button>
		</form>
	</nav>
	
	<aside class="sidebar">
		<span class="sidebar__label">Main</span>
		<a th:href="@{/home}" class="nav-btn">Home</a>
		<a th:href="@{/addvoters}" class="nav-btn">Add Voters</a>
		<a th:href="@{/addparty}" class="nav-btn active">Add Party</a>
		
		<div class="sidebar__divider"></div>
		<span class="sidebar__label">Manage</span>
		<a th:href="@{/}" class="nav-btn">Button 4</a>
	</aside>
	
	<main class="main">
		<h1 class="page-title">Entry of Party</h1>
		
		
		<p th:if="${successMessage}" th:text="${successMessage}" style="color:green"></p>
		<p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red"></p>
		
		<form id="addparty" th:action="@{/addparty}" th:object= "${partydetails}" method="post">
			<div>
				<label>Party Name</label>
				<input type="text" id="partyname" name="partyname" th:field="*{name}" required />
				<span id="partyname-error" style="color:red"></span>
				<span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red"></span>
			</div><br><br>
			<div>
				<label>Party Abbreviation</label>
				<input type="text" id="partyabbr" name="partyabbr" th:field="*{abbreviation}" required />
				<span id="partyabbr-error" style="color:red"></span>
				<span th:if="${#fields.hasErrors('abbreviation')}" th:errors="*{abbreviation}" style="color:red"></span>
			</div><br><br>
			<div>
				<label>Party Symbol</label>
				<input type="file" id="partysymbol" name="partysymbol" accept="imagine/*" th:field="*{symbol}" required />
			</div><br>
			<button type="submit">Enter</button>
		</form>
		
	</main>
	
</body>
</html>
