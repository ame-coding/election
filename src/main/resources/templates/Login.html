<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Login Page</title>
	<link rel="stylesheet" th:href="@{/css/login.css}" />
</head>	
<body>
	
	<nav class="topnav">
	  <a class="topnav__brand" href="#">Election Trends</a>
	</nav>
	
	<main class="main">
		<div class="login-wrap">
			<div class="login-header">
				<h2>Welcome</h2>
				<p>Sign in to your account to continue</p>
			</div>
			<div class="card">
				<form th:action="@{/login}" method="post">
					<div class="form-group">
						<label>Username</label>
						<input type="text" name="username" />
					</div>
					<div class="form-group">
						<label>Password</label>
						<input type="password" name="password" />
					</div>
					<button type="submit" class="btn-login">Login</button>
				
					<p th:if="${param.error}" class="alert alert-error">Invalid username of password.</p>
					<p th:if="${param.expired}" class="alert alert-warning">Your session has expired. Please log in again.</p>
					<p th:if="${param.logout}" class="alert alert-success">You have been logged out.</p>
				</form>
			</div>
		</div>
	</main>
	
	
</body>
</html>
