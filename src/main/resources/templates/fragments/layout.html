<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
	
	<nav th:fragment="topnav" class="topnav">
		<img class="topnav__deco topnav__deco--left"
		     th:src="@{/images/navlogo1.png}" alt="" />
			 
	    <a class="topnav__brand" href="#">Election Trends</a>
		
		<img class="topnav__deco topnav__deco--right"
		     th:src="@{/images/navlogo2.png}" alt="" />
	    
		<form th:action="@{/logout}" method="post">
	        <button type="submit" class="btn-logout">Logout</button>
	    </form>
	</nav>

	<aside th:fragment="sidebar(activePage)" class="sidebar">
	    <span class="sidebar__label">Main</span>
	    <a th:href="@{/home}"         th:classappend="${activePage == 'home'}         ? ' active'" class="nav-btn">Home</a>
	    <a th:href="@{/addvoters}" th:classappend="${activePage == 'addvoters'} ? ' active'" class="nav-btn">Add Voters</a>
	    <a th:href="@{/addparty}"      th:classappend="${activePage == 'addparty'}      ? ' active'" class="nav-btn">Add Party</a>
	    <a th:href="@{/addcandidate}"   th:classappend="${activePage == 'addcandidate'}   ? ' active'" class="nav-btn">Add Candidate</a>
		<a th:href="@{/mapcandidateac}"   th:classappend="${activePage == 'mapcandidateac'}   ? ' active'" class="nav-btn">Map Candidate AC</a>
		<a th:href="@{/countingrounds}"   th:classappend="${activePage == 'countingrounds'}   ? ' active'" class="nav-btn">Add Counting Rounds</a>

	    <div class="sidebar__divider"></div>
		<a th:href="@{/viewparties}"   th:classappend="${activePage == 'viewparties'}   ? ' active'" class="nav-btn">View Parties</a>
		<a th:href="@{/votespolled}"   th:classappend="${activePage == 'votespolled'}   ? ' active'" class="nav-btn">View Votes Polled</a>
		<a th:href="@{/viewcandidates}"   th:classappend="${activePage == 'viewcandidates'}   ? ' active'" class="nav-btn">View Candidates</a>

	</aside>
	
	<footer th:fragment="footer">
	    <div class="footer-container">
	      <p>Election Trends</p>
	      <nav>
	        <a th:href="@{/home}">About Us</a>
	        <a th:href="@{/home}">Terms & Condition</a>
	        <a th:href="@{/home}">Contact</a>
	      </nav>
	    </div>
	</footer>
		
	    
</body>
</html>
