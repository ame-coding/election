<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<title>Candidate Page</title>
	<link rel="stylesheet" th:href="@{/css/base.css}">
	<link rel="stylesheet" th:href="@{/css/layout.css}">
	<link rel="stylesheet" th:href="@{/css/card.css}">
	<link rel="stylesheet" th:href="@{/css/table.css}">
</head>	
<body>
	
	<div class="layout">
	<div th:replace="~{fragments/layout :: topnav}"></div>
	<div th:replace="~{fragments/layout :: sidebar('viewcandidates')}"></div>
	
	<main class="main">
		<h1 class="page-title">List of Candidates</h1>	
		
		<table>
			<thead>
				<th>Candidate Name</th>
				<th>Party Name</th>
				<th>Party Symbol</th>
				<th>Assembly Constituencies</th>
			</thead>
			<tbody>
				<tr th:each="candidate: ${viewCandidates}">
					<td th:text="${candidate.name}"></td>
					<td th:text="${candidate.party.name}"></td>
					<td>
						<img th:src="@{/parties/{code}/image(code=${candidate.party.code})}" width="100" height="100" alt="placeholderimg" />
					</td>
					<td>
						<li th:each="assemblyconstituency: ${candidate.ac}" th:text="${assemblyconstituency.name}"></li>
					</td>
				</tr>
			</tbody>
		</table>
		
		
			
	</main>
	
	<div th:replace="~{fragments/layout :: footer}"></div>
	
	</div>
	
</body>
</html>
